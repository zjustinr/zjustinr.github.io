  <script>
    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.getElementById('navMenu');
    menuToggle.addEventListener('click', function() { navMenu.classList.toggle('active'); });
    const navLinks = navMenu.querySelectorAll('a');
    navLinks.forEach(link => { link.addEventListener('click', function() { navMenu.classList.remove('active'); }); });
    function setActiveNav() {
      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      navLinks.forEach(link => { if (link.getAttribute('href') === currentPage) { link.classList.add('active'); } else { link.classList.remove('active'); } });
    }
    setActiveNav();
  </script>
</body>
